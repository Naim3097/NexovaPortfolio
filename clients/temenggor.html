<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Temenggor Case Study | NEXOVA</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar" aria-label="Main Navigation">
        <div class="nav-brand line-mask"><a href="../index.html" class="reveal-text"><img src="../assets/logo/LOGO NEXOVA ALL WHITE.png" alt="NEXOVA"></a></div>
        <div class="nav-links line-mask">
            <a href="../index.html#services" class="reveal-text">Services</a>
            <a href="../index.html#clients" class="reveal-text">Clients</a>
        </div>
    </nav>
    <main class="smooth-scroll-wrapper">
        <section class="hero-section" style="min-height: 70vh;">
            <div class="container hero-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;">
                <div class="hero-content-left">
                    <h1 class="hero-title" style="font-size: 5vw; margin-bottom: 20px;">
                        <div class="line-mask"><span class="reveal-text">The Temenggor</span></div>
                    </h1>
                    <p class="hero-tagline">
                        <div class="line-mask"><span class="reveal-text" style="color: var(--color-text-secondary); font-size: 24px;">Tourism & Hospitality</span></div>
                    </p>
                </div>
                <div class="hero-visual right">
                    <div class="about-image-wrapper line-mask" style="height: 50vh; margin-top: 0;">
                        <div class="reveal-image">
                            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&q=80&w=1000" alt="Tourism Destination" loading="eager">
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="services-section" style="padding-top: 40px; min-height: auto;">
            <div class="container services-container">
                <div class="services-layout" style="grid-template-columns: 1fr 2fr; align-items: start;">
                    <div class="section-header line-mask"><span class="reveal-text">[The Challenge]</span></div>
                    <div class="about-text">
                        <h3 class="about-statement" style="font-size: 32px; margin-bottom: 30px;">
                            <div class="line-mask"><span class="reveal-text">Capturing the raw beauty</span></div>
                            <div class="line-mask"><span class="reveal-text">of eco-tourism, driving direct</span></div>
                            <div class="line-mask"><span class="reveal-text">bookings with dynamic ad</span></div>
                            <div class="line-mask"><span class="reveal-text">placements.</span></div>
                        </h3>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script defer src="../script.js"></script>
</body>
</html>
