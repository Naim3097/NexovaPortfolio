<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Development | NEXOVA Services</title>
    <link rel="stylesheet" href="../styles.css">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" aria-label="Main Navigation">
        <div class="nav-brand line-mask">
            <a href="../index.html" class="reveal-text"><img src="../assets/logo/LOGO NEXOVA ALL WHITE.png" alt="NEXOVA"></a>
        </div>
        <div class="nav-links line-mask">
            <a href="../index.html#services" class="reveal-text">Services</a>
            <a href="../index.html#clients" class="reveal-text">Clients</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="smooth-scroll-wrapper">
        <section class="hero-section" style="min-height: 70vh;">
            <div class="container hero-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;">
                <div class="hero-content-left">
                    <h1 class="hero-title" style="font-size: 5vw; margin-bottom: 20px;">
                        <div class="line-mask"><span class="reveal-text">App</span></div>
                        <div class="line-mask"><span class="reveal-text">Development</span></div>
                    </h1>
                    <p class="hero-tagline">
                        <div class="line-mask"><span class="reveal-text" style="color: var(--color-text-secondary); font-size: 24px;">Scalable iOS & Android Architecture</span></div>
                    </p>
                </div>
                <!-- Premium Right Side Visual -->
                <div class="hero-visual right">
                    <!-- Added image wrapper for visual symmetry to the other pages -->
                    <div class="about-image-wrapper line-mask" style="height: 50vh; margin-top: 0;">
                        <div class="reveal-image">
                            <img src="https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&q=80&w=1000" alt="Mobile App Development on Smartphone" loading="eager">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Brief Methodology -->
        <section class="services-section" style="padding-top: 40px; min-height: auto;">
            <div class="container services-container">
                <div class="services-layout" style="grid-template-columns: 1fr 2fr; align-items: start;">
                    <div class="section-header line-mask">
                        <span class="reveal-text">[Our Approach]</span>
                    </div>
                    <div class="about-text">
                        <h3 class="about-statement" style="font-size: 32px; margin-bottom: 30px;">
                            <div class="line-mask"><span class="reveal-text">We build secure, enterprise-grade</span></div>
                            <div class="line-mask"><span class="reveal-text">mobile applications that scale</span></div>
                            <div class="line-mask"><span class="reveal-text">effortlessly with your business.</span></div>
                        </h3>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Closing CTA -->
        <section class="closing-section" style="min-height: 50vh;">
            <div class="container closing-container">
                <h2 class="closing-statement" style="font-size: 40px; margin-bottom: 40px;">
                    <div class="line-mask"><span class="reveal-text">Ready to code your next app?</span></div>
                </h2>
                <div class="closing-cta line-mask">
                    <a href="mailto:sales@nexovadigital.com" class="magnetic-btn reveal-text">Start A Project</a>
                </div>
            </div>
        </section>
    </main>

    <!-- GSAP / Scripts -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script defer src="../script.js"></script>
</body>
</html>
